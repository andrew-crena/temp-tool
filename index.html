<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temperature Converter</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #111;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .container {
    width: 90%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .box {
    background: #1a1a1a;
    border-radius: 14px;
    padding: 16px;
    text-align: center;
  }

  .label {
    font-size: 13px;
    margin-bottom: 6px;
    opacity: 0.7;
  }

  input {
    width: 100%;
    font-size: 32px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
    text-align: center;
  }

  .result {
    font-size: 26px;
    font-weight: 500;
  }

  .small {
    font-size: 14px;
    opacity: 0.8;
  }
</style>
</head>

<body>

<div class="container">

  <!-- LOCAL TEMPERATURE -->
  <div class="box">
    <div class="label">Stanford (Current)</div>
    <div id="localTemp" class="small">Loading…</div>
  </div>

  <!-- Fahrenheit → Celsius -->
  <div class="box">
    <div class="label">Fahrenheit → Celsius</div>
    <input id="fInput" type="number" placeholder="Enter °F">
  </div>

  <!-- Celsius → Fahrenheit -->
  <div class="box">
    <div class="label">Celsius → Fahrenheit</div>
    <input id="cInput" type="number" placeholder="Enter °C">
  </div>

  <!-- Result -->
  <div class="box">
    <div class="label">Converted Temperature</div>
    <div id="result" class="result">—</div>
  </div>

</div>

<script>
const fInput = document.getElementById("fInput");
const cInput = document.getElementById("cInput");
const result = document.getElementById("result");
const localTemp = document.getElementById("localTemp");

// --- conversion logic ---

fInput.addEventListener("input", () => {
  const f = parseFloat(fInput.value);

  if (isNaN(f)) {
    result.innerText = "—";
    return;
  }

  const c = (f - 32) * 5 / 9;
  result.innerText = `${f}°F = ${c.toFixed(2)}°C`;

  cInput.value = "";
});

cInput.addEventListener("input", () => {
  const c = parseFloat(cInput.value);

  if (isNaN(c)) {
    result.innerText = "—";
    return;
  }

  const f = (c * 9 / 5) + 32;
  result.innerText = `${c}°C = ${f.toFixed(2)}°F`;

  fInput.value = "";
});

// --- LOCAL TEMPERATURE (Stanford coordinates) ---

function loadStanfordTemp() {
  const lat = 37.4275;
  const lon = -122.1697;

  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`;

  fetch(url)
    .then(res => res.json())
    .then(data => {
      const c = data.current_weather.temperature;
      const f = (c * 9 / 5) + 32;

      localTemp.innerText = `${f.toFixed(1)}°F / ${c.toFixed(1)}°C`;
    })
    .catch(() => {
      localTemp.innerText = "Unavailable";
    });
}

// --- init ---
window.onload = () => {
  fInput.focus();
  loadStanfordTemp();
};
</script>

</body>
</html>
