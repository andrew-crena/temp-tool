<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>F → C</title>

  <!-- Makes it feel like an app on mobile -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      text-align: center;
      margin: 0;
      padding: 40px 20px;
      background: #111;
      color: white;
    }

    input {
      width: 80%;
      max-width: 300px;
      font-size: 40px;
      padding: 12px;
      text-align: center;
      border-radius: 12px;
      border: none;
      outline: none;
    }

    #result {
      margin-top: 30px;
      font-size: 28px;
      opacity: 0.9;
    }
  </style>
</head>

<body>

<input 
  id="f" 
  type="number" 
  placeholder="°F"
  inputmode="decimal"
/>

<div id="result">—</div>

<script>
const input = document.getElementById("f");
const result = document.getElementById("result");

// AUTO-FOCUS on load (critical for NFC flow)
window.onload = () => {
  input.focus();
};

// LIVE conversion (no button)
input.addEventListener("input", () => {
  const f = parseFloat(input.value);

  if (isNaN(f)) {
    result.innerText = "—";
    return;
  }

  const c = (f - 32) * 5 / 9;
  result.innerText = `${c.toFixed(2)} °C`;
});
</script>

</body>
</html>
