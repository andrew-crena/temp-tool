<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temp</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #111;
    transition: background 0.4s ease;
  }

  .wrap {
    width: 100%;
    max-width: 400px;
    text-align: center;
  }

  .temp {
    margin: 25px 0;
  }

  input {
    width: 100%;
    font-size: 64px;
    text-align: center;
    border: none;
    outline: none;
    background: transparent;
    color: white;
  }

  .unit {
    font-size: 18px;
    opacity: 0.5;
    margin-top: 6px;
  }
</style>
</head>

<body>

<div class="wrap">

  <div class="temp">
    <input id="f" type="number" inputmode="decimal" placeholder="—">
    <div class="unit">°F</div>
  </div>

  <div class="temp">
    <input id="c" type="number" inputmode="decimal" placeholder="—">
    <div class="unit">°C</div>
  </div>

</div>

<script>
const f = document.getElementById("f");
const c = document.getElementById("c");

let active = "f";

// formatting
const fmt = n => Number(n.toFixed(2)).toString();

// color mapping (improved, smoother)
function setColor(tempC) {
  if (isNaN(tempC)) return;

  const t = Math.max(0, Math.min(1, (tempC + 10) / 50));

  const hue = (1 - t) * 220; // blue → red
  document.body.style.background = `hsl(${hue}, 70%, 40%)`;
}

// conversions
function fromF() {
  const val = parseFloat(f.value);
  if (isNaN(val)) { c.value = ""; return; }

  const out = (val - 32) * 5/9;
  c.value = fmt(out);
  setColor(out);
}

function fromC() {
  const val = parseFloat(c.value);
  if (isNaN(val)) { f.value = ""; return; }

  const out = val * 9/5 + 32;
  f.value = fmt(out);
  setColor(val);
}

// events
f.addEventListener("focus", () => { active = "f"; f.select(); });
c.addEventListener("focus", () => { active = "c"; c.select(); });

f.addEventListener("input", () => active === "f" && fromF());
c.addEventListener("input", () => active === "c" && fromC());

// swipe down to clear
let startY = null;

document.addEventListener("touchstart", e => {
  startY = e.touches[0].clientY;
});

document.addEventListener("touchend", e => {
  if (!startY) return;

  const dy = e.changedTouches[0].clientY - startY;

  if (dy > 120) {
    f.value = "";
    c.value = "";
    document.body.style.background = "#111";
  }

  startY = null;
});

// init
window.onload = () => {
  f.focus();
};
</script>

</body>
</html>
