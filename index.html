  <meta name="viewport" content="widt<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Temp</title>

<style>
  :root {
    --bg: #0b0b0c;
    --card: #121214;
    --text: #f5f5f7;
    --muted: #9aa0a6;
    --accent: #4da3ff;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: radial-gradient(1200px 800px at 50% -10%, #1a1a1d, var(--bg));
    color: var(--text);
    height: 100vh;
    display: grid;
    place-items: center;
  }

  .wrap {
    width: 100%;
    max-width: 420px;
    padding: 24px 16px 28px;
  }

  .card {
    background: linear-gradient(180deg, #141417, #0f0f12);
    border-radius: 20px;
    padding: 18px 16px 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.03);
  }

  .row {
    display: grid;
    gap: 6px;
    margin: 10px 0 18px;
  }

  .label {
    font-size: 13px;
    letter-spacing: .04em;
    color: var(--muted);
  }

  input {
    width: 100%;
    font-size: 56px;
    line-height: 1.1;
    padding: 10px 12px;
    border-radius: 14px;
    border: none;
    outline: none;
    text-align: center;
    color: var(--text);
    background: var(--card);
    transition: background .15s ease, transform .04s ease;
  }

  input:focus {
    background: #17171b;
    box-shadow: 0 0 0 2px rgba(77,163,255,.15);
  }

  .unit {
    font-size: 18px;
    margin-left: 6px;
    opacity: .7;
  }

  .hint {
    margin-top: 6px;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    opacity: .8;
  }

  .flash {
    animation: flash .18s ease;
  }

  @keyframes flash {
    from { transform: scale(0.995); }
    to   { transform: scale(1); }
  }
</style>
</head>

<body>

<div class="wrap">
  <div class="card" id="card">

    <div class="row">
      <div class="label">FAHRENHEIT</div>
      <div>
        <input id="f" type="number" inputmode="decimal" placeholder="—">
      </div>
    </div>

    <div class="row">
      <div class="label">CELSIUS</div>
      <div>
        <input id="c" type="number" inputmode="decimal" placeholder="—">
      </div>
    </div>

    <div class="hint">Type in either field • Swipe down to clear</div>
  </div>
</div>

<script>
const fInput = document.getElementById("f");
const cInput = document.getElementById("c");
const card = document.getElementById("card");

let active = "f"; // default

// --- formatting ---
const fmt = (n) => {
  const s = Number(n.toFixed(2)).toString();
  return s;
};

// --- persistence ---
const save = (f, c, mode) => {
  localStorage.setItem("temp_state", JSON.stringify({ f, c, mode }));
};

const load = () => {
  try {
    const s = JSON.parse(localStorage.getItem("temp_state"));
    if (!s) return;
    if (s.f !== "") fInput.value = s.f;
    if (s.c !== "") cInput.value = s.c;
    if (s.mode) active = s.mode;
  } catch {}
};

// --- conversion ---
function fromF() {
  const f = parseFloat(fInput.value);
  if (isNaN(f)) { cInput.value = ""; return; }
  const c = (f - 32) * 5 / 9;
  cInput.value = fmt(c);
  save(fInput.value, cInput.value, "f");
  feedback();
}

function fromC() {
  const c = parseFloat(cInput.value);
  if (isNaN(c)) { fInput.value = ""; return; }
  const f = (c * 9 / 5) + 32;
  fInput.value = fmt(f);
  save(fInput.value, cInput.value, "c");
  feedback();
}

// --- feedback ---
function feedback() {
  card.classList.remove("flash");
  void card.offsetWidth;
  card.classList.add("flash");

  if (navigator.vibrate) {
    navigator.vibrate(5);
  }
}

// --- event wiring ---
fInput.addEventListener("focus", () => {
  active = "f";
  fInput.select();
});

cInput.addEventListener("focus", () => {
  active = "c";
  cInput.select();
});

fInput.addEventListener("input", () => {
  if (active === "f") fromF();
});

cInput.addEventListener("input", () => {
  if (active === "c") fromC();
});

// --- clear gesture (swipe down) ---
let startY = null;

document.addEventListener("touchstart", (e) => {
  startY = e.touches[0].clientY;
});

document.addEventListener("touchend", (e) => {
  if (startY === null) return;
  const endY = e.changedTouches[0].clientY;
  if (endY - startY > 120) {
    fInput.value = "";
    cInput.value = "";
    localStorage.removeItem("temp_state");
    feedback();
  }
  startY = null;
});

// --- initial load ---
window.onload = () => {
  load();

  const params = new URLSearchParams(window.location.search);
  if (params.get("mode") === "c") active = "c";

  if (active === "c") {
    cInput.focus();
  } else {
    fInput.focus();
  }
};
</script>

</body>

<body>

<input 
  id="f" 
  type="number" 
  placeholder="°F"
  inputmode="decimal"
/>

<div id="result">—</div>

<script>
const input = document.getElementById("f");
const result = document.getElementById("result");

// AUTO-FOCUS on load (critical for NFC flow)
window.onload = () => {
  input.focus();
};

// LIVE conversion (no button)
input.addEventListener("input", () => {
  const f = parseFloat(input.value);

  if (isNaN(f)) {
    result.innerText = "—";
    return;
  }

  const c = (f - 32) * 5 / 9;
  result.innerText = `${c.toFixed(2)} °C`;
});
</script>
